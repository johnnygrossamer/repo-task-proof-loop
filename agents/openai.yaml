interface:
  display_name: "Repo Task Proof Loop"
  short_description: "Init repo-local task artifacts, install role-specific subagents, and drive spec → build → evidence → verify → fix loops."
  default_prompt: "Spawn subagents and use $repo-task-proof-loop to init a new <NEW_TASK_ID> or continue an existing <EXISTING_TASK_ID> from its repo-local artifacts in this repository."
policy:
  allow_implicit_invocation: false
